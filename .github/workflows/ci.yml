name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: activity_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d activity_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/activity_test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run test:e2e
      - run: npm run build
      - run: npm run api:check
      - run: npm run test:package
      - run: npm run benchmark:postgres
      - run: npm ci --prefix examples/nextjs
      - run: npm run build --prefix examples/nextjs
      - run: npm ci --prefix examples/stackblitz
      - run: npm run build --prefix examples/stackblitz
      - run: npm audit --prefix examples/nextjs --audit-level=moderate
      - run: npm audit --prefix examples/stackblitz --audit-level=moderate
      - run: npm audit --audit-level=moderate

  runtime-compatibility:
    name: Node ${{ matrix.node }} / React ${{ matrix.react }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
        react: [18, 19]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm install --no-save react@${{ matrix.react }} react-dom@${{ matrix.react }}
      - run: npm run test:unit
      - run: npm run build

  postgres-compatibility:
    name: PostgreSQL ${{ matrix.postgres }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres: [14, 15, 16, 17]
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}-alpine
        env:
          POSTGRES_DB: activity_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d activity_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/activity_test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node --import tsx --test tests/postgres.test.ts
